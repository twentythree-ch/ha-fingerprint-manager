start_enrollment:
  name: Start Enrollment
  description: >-
    Enroll a new fingerprint and assign it to a user. The ESPHome reader will
    prompt for the required number of scans. The mapping is pre-registered so
    confirmed scans are recognised immediately.
  fields:
    fingerprint_id:
      name: Fingerprint ID
      description: Slot number on the reader (1–200).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 200
          mode: box
    user:
      name: User
      description: Name of the person to assign this fingerprint to.
      required: true
      example: Alice
      selector:
        text:
    label:
      name: Label
      description: "Optional free-text label (e.g. 'Left index finger')."
      required: false
      example: Left index finger
      selector:
        text:
    num_scans:
      name: Number of scans
      description: How many times the user must scan their finger (matches the ESPHome num_scans variable).
      required: false
      default: 2
      example: 2
      selector:
        number:
          min: 1
          max: 10
          mode: box

cancel_enrollment:
  name: Cancel Enrollment
  description: Abort the current enrollment process.

delete_fingerprint:
  name: Delete Fingerprint
  description: Remove a fingerprint mapping and delete the slot from the ESPHome reader.
  fields:
    fingerprint_id:
      name: Fingerprint ID
      description: Slot number to delete (1–200).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 200
          mode: box

delete_all_fingerprints:
  name: Delete All Fingerprints
  description: Remove all fingerprint mappings and wipe all slots from the ESPHome reader.

update_fingerprint:
  name: Update Fingerprint
  description: Change the user name or label of an existing fingerprint mapping (no hardware interaction).
  fields:
    fingerprint_id:
      name: Fingerprint ID
      description: Slot number to update.
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 200
          mode: box
    user:
      name: User
      description: New user name.
      required: false
      example: Bob
      selector:
        text:
    label:
      name: Label
      description: New label.
      required: false
      example: Right thumb
      selector:
        text:
