start_enrollment:
  name: Start Enrollment
  description: >-
    Enroll a new fingerprint and assign it to a user. The fingerprint reader
    will prompt for the required number of scans. The mapping is stored
    immediately so the sensor reflects the new user at once.
  fields:
    fingerprint_id:
      name: Fingerprint ID
      description: Slot number on the reader (1–200).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 200
          mode: box
    user:
      name: User
      description: Name of the person to assign to this fingerprint.
      required: true
      example: Alice
      selector:
        text:
    label:
      name: Label
      description: "Optional free-text label (e.g. 'Left index finger')."
      required: false
      example: Left index finger
      selector:
        text:
    num_scans:
      name: Number of scans
      description: How many times the user must present their finger during enrollment.
      required: false
      default: 2
      example: 2
      selector:
        number:
          min: 1
          max: 10
          mode: box

cancel_enrollment:
  name: Cancel Enrollment
  description: Abort the current enrollment process.

delete_fingerprint:
  name: Delete Fingerprint
  description: Remove a fingerprint mapping from the component (and the ESPHome reader if configured).
  fields:
    fingerprint_id:
      name: Fingerprint ID
      description: Slot number to delete.
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 200
          mode: box

update_fingerprint:
  name: Update Fingerprint
  description: Change the user name or label of an existing fingerprint mapping.
  fields:
    fingerprint_id:
      name: Fingerprint ID
      description: Slot number to update.
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 200
          mode: box
    user:
      name: User
      description: New user name.
      required: false
      example: Bob
      selector:
        text:
    label:
      name: Label
      description: New label.
      required: false
      example: Right thumb
      selector:
        text:
