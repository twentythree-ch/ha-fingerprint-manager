name: Tests

on:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cat > constraints.txt <<'EOF'
          homeassistant==2024.12.5
          pytest-homeassistant-custom-component==0.13.201
          EOF
          pip install -c constraints.txt -r requirements_test.txt

      - name: Run tests
        run: pytest
